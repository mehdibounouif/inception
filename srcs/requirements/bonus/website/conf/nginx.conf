# ============================================================
# nginx.conf — static website container
# ============================================================
# This nginx instance serves ONLY static files.
# It listens on port 80 inside the Docker network.
# TLS is handled upstream by the main nginx on port 443.
# ============================================================

events {
    # Maximum simultaneous connections per worker process.
    # 1024 is more than enough for a portfolio page.
    worker_connections 1024;
}

http {
    # Load MIME type mappings (text/css, image/png, etc.).
    # Without this, every file is served as application/octet-stream
    # and browsers won't render CSS or run JavaScript.
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        # Listen on port 80 — plain HTTP inside the Docker network.
        # The main nginx reaches us here via the inception bridge.
        listen 80;
        listen [::]:80;

        # Serve files from this directory.
        root  /var/www/static;
        index index.html;

        # Single location block: try to serve the exact file requested,
        # then fall back to index.html (useful for single-page apps).
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Deny access to hidden files (.htaccess, .git, etc.).
        location ~ /\. {
            deny all;
        }
    }
}