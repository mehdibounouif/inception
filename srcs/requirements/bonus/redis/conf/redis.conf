# ============================================================
# Redis configuration — tuned for WordPress object caching
# ============================================================

# -----------------------------------------------------------
# NETWORK
# -----------------------------------------------------------

# Bind to all interfaces so containers on the inception network
# can connect using the service hostname "redis".
# The default Debian config binds only to 127.0.0.1 (loopback),
# which would make Redis completely invisible to WordPress.
bind 0.0.0.0

# Standard Redis port. WordPress's redis-cache plugin connects here.
port 6379

# Disable protected-mode. Protected-mode is designed for Redis
# instances exposed directly to the internet — it refuses connections
# when no password is set and the server is bound to 0.0.0.0.
# Inside our private Docker network this is unnecessary and would
# block WordPress from connecting.
protected-mode no

# -----------------------------------------------------------
# PROCESS
# -----------------------------------------------------------

# CRITICAL: never daemonise. Docker tracks the process as PID 1.
# If Redis daemonises, Docker sees the PID exit and kills the
# container. "restart: always" only works with foreground processes.
daemonize no

# Log to stdout so "docker logs redis" shows everything.
# An empty string means "write to standard output".
logfile ""

# Log level: notice logs startup, shutdown, and important events
# without flooding the output with every cache hit.
loglevel notice

# -----------------------------------------------------------
# MEMORY — cache size limit
# -----------------------------------------------------------

# Cap memory usage at 256 MB. Without a limit Redis grows until
# the OS kills it with OOM. Choose a value that fits your VM RAM.
maxmemory 256mb

# Eviction policy: when Redis reaches maxmemory, it removes the
# least-recently-used key from the entire keyspace to make room.
# This is the correct policy for a cache — we discard cold data
# and keep whatever WordPress accessed most recently.
maxmemory-policy allkeys-lru

# -----------------------------------------------------------
# PERSISTENCE — disabled (cache only, not a database)
# -----------------------------------------------------------

# RDB snapshots write the entire dataset to disk periodically.
# We turn this off: if Redis restarts, WordPress simply rebuilds
# the cache on the next few requests. Disk I/O for a cache is waste.
save ""

# AOF (Append-Only File) logs every write for point-in-time recovery.
# Again unnecessary for a cache — disabled.
appendonly no