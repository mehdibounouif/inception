# ============================================================
# vsftpd configuration — FTP server for the WordPress volume
# ============================================================

# -----------------------------------------------------------
# ACCESS CONTROL
# -----------------------------------------------------------

# Allow local OS users (created with useradd) to log in.
# Anonymous FTP (no password) is disabled for security.
local_enable=YES
anonymous_enable=NO

# Allow authenticated users to upload, rename, and delete files.
# Without this flag vsftpd is read-only even for logged-in users.
write_enable=YES

# Apply the standard Linux umask for new files (755 dirs, 644 files).
local_umask=022

# -----------------------------------------------------------
# CHROOT JAIL — security isolation
# -----------------------------------------------------------

# Lock each user inside their own home directory.
# The FTP user's home is /var/www/html (set in setup-ftp.sh),
# so they can only see and modify WordPress files — nothing else
# on the filesystem is accessible.
chroot_local_user=YES

# vsftpd refuses to chroot into a directory that the user can write
# to (it's a security check). /var/www/html is writable by our FTP
# user, so we must allow this exception explicitly.
allow_writeable_chroot=YES

# -----------------------------------------------------------
# PASSIVE MODE — required for Docker NAT
# -----------------------------------------------------------

# Enable passive mode. Without it, active mode (server contacts client)
# is used, which breaks behind Docker's NAT layer.
pasv_enable=YES

# The range of ports vsftpd opens for data transfers.
# The client connects TO these ports — they must be published in
# docker-compose.yml ports: and opened in the VM's firewall.
pasv_min_port=21100
pasv_max_port=21110

# Tell vsftpd which IP to advertise to the FTP client for passive
# connections. This MUST be the VM's external IP (the one the
# evaluator's FTP client connects to). We leave this commented out
# here and rely on the VM's routing; if transfers hang, uncomment
# and set this to your VM's IP address.
# pasv_address=YOUR_VM_IP

# -----------------------------------------------------------
# USER FILESYSTEM ROOT
# -----------------------------------------------------------

# Set the root directory for local users.
# This is the directory the FTP user lands in after login.
# It matches the WordPress webroot and the wp_data volume mount.
local_root=/var/www/html

# -----------------------------------------------------------
# PROCESS
# -----------------------------------------------------------

# Run vsftpd in the foreground so Docker can track it as PID 1.
# If vsftpd forks to background, Docker sees the process exit
# and kills the container immediately.
background=NO

# Write log entries so "docker logs ftp" shows connection activity.
xferlog_enable=YES
xferlog_std_format=YES