# ============================================================
# vsftpd.conf — FTP server for the WordPress volume
# ============================================================

# -----------------------------------------------------------
# STANDALONE MODE — required on Debian
# -----------------------------------------------------------

# Run vsftpd as a standalone daemon (not via inetd/xinetd).
# This is required on Debian — without it vsftpd exits immediately.
listen=YES

# Disable IPv6 standalone socket — we use IPv4 (listen=YES above).
# Both listen=YES and listen_ipv6=YES cannot be active at the same time.
listen_ipv6=NO

# -----------------------------------------------------------
# ACCESS CONTROL
# -----------------------------------------------------------

# Allow local OS users (created with useradd) to log in.
local_enable=YES

# Anonymous FTP disabled — credentials required.
anonymous_enable=NO

# Allow authenticated users to upload, rename, and delete files.
write_enable=YES

# Standard umask: 755 for dirs, 644 for files.
local_umask=022

# -----------------------------------------------------------
# CHROOT JAIL
# -----------------------------------------------------------

# Lock each user inside their home directory (/var/www/html).
chroot_local_user=YES

# /var/www/html is writable by our FTP user — allow this exception.
allow_writeable_chroot=YES

# -----------------------------------------------------------
# PASSIVE MODE — required for Docker NAT
# -----------------------------------------------------------

pasv_enable=YES
pasv_min_port=21100
pasv_max_port=21110

# -----------------------------------------------------------
# FILESYSTEM ROOT
# -----------------------------------------------------------

# FTP user lands in /var/www/html = WordPress webroot = wp_data volume.
local_root=/var/www/html

# -----------------------------------------------------------
# PROCESS
# -----------------------------------------------------------

# Run in the foreground so Docker tracks vsftpd as PID 1.
background=NO

# Log connection activity visible via "docker logs ftp".
xferlog_enable=YES
xferlog_std_format=YES