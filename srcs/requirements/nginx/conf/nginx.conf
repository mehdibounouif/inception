# ============================================================
# nginx.conf — main nginx (TLS entrypoint + reverse proxy)
# ============================================================
# This file is a TEMPLATE. The string DOMAIN_PLACEHOLDER is
# replaced at container startup by entrypoint.sh using sed:
#   sed "s/DOMAIN_PLACEHOLDER/${DOMAIN_NAME}/g" nginx.conf.template
#
# nginx acts as:
#   1. TLS terminator — all HTTPS (port 443) traffic enters here.
#   2. PHP-FPM gateway — passes *.php requests to WordPress.
#   3. Reverse proxy — routes /portfolio/, /adminer/, /portainer/
#      to their respective containers on the inception network.
#
# Traffic flow:
#   Browser → nginx:443 (TLS) → wordpress:9000 (FastCGI)
#                              → website:80    (HTTP proxy)
#                              → adminer:9000  (FastCGI)
#                              → portainer:9000 (HTTP proxy)
# ============================================================

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 443 ssl;
        listen [::]:443 ssl;

        # Replaced at runtime by entrypoint.sh → sed substitution.
        # Final value: server_name mbounoui.42.fr;
        server_name DOMAIN_PLACEHOLDER;

        # TLS certificate generated at container startup by
        # generate-ssl.sh (called from entrypoint.sh).
        ssl_certificate     /etc/nginx/ssl/nginx.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx.key;

        # Only TLSv1.2 and TLSv1.3 are allowed.
        # Subject requirement: no older protocols (TLSv1.0, TLSv1.1, SSLv3).
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers   HIGH:!aNULL:!MD5;

        # WordPress webroot — nginx serves static files (images, CSS,
        # JS) from here directly without involving php-fpm.
        root  /var/www/html;
        index index.php index.html index.htm;

        # ----------------------------------------------------------
        # WordPress — main site (/)
        # ----------------------------------------------------------

        location / {
            # Try to serve the exact file requested (static asset).
            # If not found, try it as a directory.
            # If still not found, hand off to WordPress's index.php
            # with the original query string (needed for pretty URLs).
            try_files $uri $uri/ /index.php?$args;
        }

        # Pass all PHP requests to the WordPress container via FastCGI.
        # WordPress runs php-fpm which listens on wordpress:9000.
        location ~ \.php$ {
            # "wordpress" resolves to the WordPress container's IP via
            # Docker's built-in DNS on the inception bridge network.
            fastcgi_pass  wordpress:9000;
            fastcgi_index index.php;
            include       fastcgi_params;
            # SCRIPT_FILENAME tells php-fpm the full path of the PHP
            # file to execute. Without this, php-fpm returns a blank page.
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO       $fastcgi_path_info;
        }

        # Deny access to .htaccess and other hidden files.
        location ~ /\.ht {
            deny all;
        }

        # ----------------------------------------------------------
        # BONUS: Static website — /portfolio/
        # ----------------------------------------------------------
        # Requests to https://mbounoui.42.fr/portfolio/ are proxied
        # to the website container's nginx on port 80 (plain HTTP
        # inside the Docker network — TLS is already terminated here).

        location /portfolio/ {
            # proxy_pass forwards the request to the website container.
            # The trailing slash after website:80/ strips the /portfolio/
            # prefix before forwarding, so the static nginx sees "/" not "/portfolio/".
            proxy_pass http://website:80/;

            # Pass standard proxy headers so the backend knows the
            # original request details (host, protocol, client IP).
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ----------------------------------------------------------
        # BONUS: Adminer — /adminer/
        # ----------------------------------------------------------
        # Adminer runs php-fpm on adminer:9000. We use FastCGI
        # (same as WordPress) because Adminer is also a PHP app.

        location /adminer/ {
            # FastCGI root: where Adminer's index.php lives inside
            # the adminer container's filesystem.
            root /var/www/adminer;

            # Try to serve a static file first; fall back to index.php.
            # This handles Adminer's internal asset requests correctly.
            try_files $uri /index.php$is_args$args;
        }

        location ~ ^/adminer/.*\.php$ {
            # Rewrite the URI: strip the /adminer/ prefix so php-fpm
            # receives a path that matches the file on the adminer container.
            rewrite ^/adminer(/.*)$ $1 break;

            # adminer container's php-fpm listens on port 9000.
            fastcgi_pass  adminer:9000;
            fastcgi_index index.php;
            include       fastcgi_params;
            # The document root inside the adminer container.
            fastcgi_param SCRIPT_FILENAME /var/www/adminer$fastcgi_script_name;
            fastcgi_param PATH_INFO       $fastcgi_path_info;
        }

        # ----------------------------------------------------------
        # BONUS: Portainer — /portainer/
        # ----------------------------------------------------------
        # Portainer runs its own HTTP server on port 9000.
        # We use proxy_pass (not FastCGI) because Portainer is a
        # Go binary serving its own HTTP, not a PHP-FPM process.

        location /portainer/ {
            # Strip /portainer prefix before forwarding.
            proxy_pass http://portainer:9000/;

            # Portainer's web UI uses WebSockets for live log streaming
            # and container stats. These two headers enable WebSocket
            # connection upgrade through the nginx proxy.
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}