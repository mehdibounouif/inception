# ============================================================
# nginx.conf — main nginx (TLS entrypoint + reverse proxy)
# ============================================================
# This file is a TEMPLATE. The string DOMAIN_PLACEHOLDER is
# replaced at container startup by entrypoint.sh using sed:
#   sed "s/DOMAIN_PLACEHOLDER/${DOMAIN_NAME}/g" nginx.conf.template
#
# nginx acts as:
#   1. TLS terminator — all HTTPS (port 443) traffic enters here.
#   2. PHP-FPM gateway — passes *.php requests to WordPress.
#   3. Reverse proxy — routes /portfolio/, /adminer/, /portainer/
#      to their respective containers on the inception network.
#
# Traffic flow:
#   Browser → nginx:443 (TLS) → wordpress:9000 (FastCGI)
#                              → website:80    (HTTP proxy)
#                              → adminer:9000  (FastCGI)
#                              → portainer:9000 (HTTP proxy)
# ============================================================

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 443 ssl;
        listen [::]:443 ssl;

        # Replaced at runtime by entrypoint.sh → sed substitution.
        # Final value: server_name mbounoui.42.fr;
        server_name DOMAIN_PLACEHOLDER;

        # TLS certificate generated at container startup by
        # generate-ssl.sh (called from entrypoint.sh).
        ssl_certificate     /etc/nginx/ssl/nginx.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx.key;

        # Only TLSv1.2 and TLSv1.3 are allowed.
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers   HIGH:!aNULL:!MD5;

        # WordPress webroot — nginx serves static files (images, CSS,
        # JS) from here directly without involving php-fpm.
        root  /var/www/html;
        index index.php index.html index.htm;

        # ----------------------------------------------------------
        # WordPress — main site (/)
        # ----------------------------------------------------------

        location / {
            try_files $uri $uri/ /index.php?$args;
        }

        # Pass all PHP requests to the WordPress container via FastCGI.
        location ~ \.php$ {
            fastcgi_pass  wordpress:9000;
            fastcgi_index index.php;
            include       fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO       $fastcgi_path_info;
        }

        # Deny access to .htaccess and other hidden files.
        location ~ /\.ht {
            deny all;
        }

        location /portfolio/ {
            proxy_pass http://website:80/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /adminer/ {
            # Rewrite /adminer/... → /... before FastCGI processing.
            rewrite ^/adminer(/.*)?$ $1 break;

            # Forward to adminer container's php-fpm on port 9000.
            # Try to serve a static file first; fall back to index.php.
            # This handles Adminer's internal asset requests correctl
            try_files $uri /index.php$is_args$args;
        }

        location ~ ^/adminer/.*\.php$ {
            # Rewrite the URI: strip the /adminer/ prefix so php-fpm
            # receives a path that matches the file on the adminer container.
            rewrite ^/adminer(/.*)$ $1 break;

            # adminer container's php-fpm listens on port 9000.
            fastcgi_pass  adminer:9000;
            fastcgi_index index.php;
            include       fastcgi_params;

            # Point SCRIPT_FILENAME directly at the single Adminer PHP file.
            # $fastcgi_script_name after the rewrite is just "/" or "/index.php"
            # so we always resolve to /var/www/adminer/index.php.
            fastcgi_param SCRIPT_FILENAME /var/www/adminer/index.php;
            fastcgi_param PATH_INFO       $fastcgi_path_info;
        }

        location /portainer/ {
            # Strip /portainer prefix: the trailing slash on proxy_pass
            # combined with the location match causes nginx to replace
            # the matched prefix with "/" before forwarding.
            proxy_pass http://portainer:9000/;

            # WebSocket support — needed for Portainer's live UI updates.
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Long timeout for Portainer's streaming endpoints.
            proxy_read_timeout 3600s;
        }

        location /portainer/api/websocket/ {
            proxy_pass http://portainer:9000/api/websocket/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}